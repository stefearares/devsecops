# ── Apache Security Hardening ────────────────────────────────────────────────

# Hide server tokens (version + OS)
ServerTokens Prod
ServerSignature Off

# Disable TRACE method
TraceEnable Off

# Clickjacking protection
Header always set X-Frame-Options "SAMEORIGIN"

# XSS filter
Header always set X-XSS-Protection "1; mode=block"

# MIME-type sniffing protection
Header always set X-Content-Type-Options "nosniff"

# Referrer policy
Header always set Referrer-Policy "strict-origin-when-cross-origin"

# Content Security Policy (permissive baseline – tighten per your theme/plugins)
Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';"

# Disable directory listing
Options -Indexes

# Block access to sensitive files
<FilesMatch "^(wp-config\.php|\.htaccess|xmlrpc\.php|readme\.html|license\.txt)$">
    Require all denied
</FilesMatch>

# Block XML-RPC (common bruteforce vector)
<Files "xmlrpc.php">
    Require all denied
</Files>
