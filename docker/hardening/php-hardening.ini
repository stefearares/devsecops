; ── PHP Security Hardening ────────────────────────────────────────────────────

; Hide PHP version from HTTP headers
expose_php = Off

; Disable dangerous functions
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source,pcntl_exec

; Limit file operations
allow_url_fopen  = Off
allow_url_include = Off

; Session security
session.cookie_httponly = On
session.cookie_secure   = On
session.use_strict_mode = 1
session.cookie_samesite = Strict

; Error reporting – never expose to users
display_errors         = Off
display_startup_errors = Off
log_errors             = On
error_reporting        = E_ALL

; Limit upload / POST size
upload_max_filesize = 10M
post_max_size       = 10M

; Disable XML-RPC (WordPress handles this, but belt-and-suspenders)
; -- actual XML-RPC disablement is done in Apache config

; Memory and execution limits
memory_limit        = 128M
max_execution_time  = 30
max_input_time      = 30
