name: WordPress WPScan

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      scan_target:
        description: "'vanilla' or 'hardened'"
        required: true
        default: "vanilla"
        type: choice
        options:
          - vanilla
          - hardened

env:
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKERHUB: docker.io
  IMAGE_NAME: ${{ github.repository_owner }}/wordpress-hardened
  COMPOSE_FILE: docker/docker-compose.yml

jobs:
  # JOB 1 – Scan the vanilla (un-patched) WordPress image
  wpscan-vanilla:
    name: "Scan Vanilla WordPress"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.scan_target == 'vanilla'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start stack via Docker Compose (vanilla image)
        env:
          WP_IMAGE: wordpress:6.4-php8.2-apache
        run: |
          docker compose -f "$COMPOSE_FILE" up -d --wait --wait-timeout 180

      - name: Wait for WordPress HTTP readiness
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || true)
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "301" ]; then
              echo "WordPress responded with $STATUS"
              exit 0
            fi
            sleep 5
          done
          echo "WordPress did not become ready in time" >&2
          mkdir -p scans/vanilla
          docker compose -f "$COMPOSE_FILE" logs --no-color > scans/vanilla/compose.log || true
          exit 1

      - name: Complete WordPress installation
        run: |
          docker exec wp-site bash -c "
            curl -sS -o /usr/local/bin/wp https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar && \
            chmod +x /usr/local/bin/wp && \
            wp core install \
              --url=http://localhost:8080 \
              --title='DevSecOps Lab' \
              --admin_user=admin \
              --admin_password=admin \
              --admin_email=admin@example.com \
              --skip-email \
              --allow-root
          "

      - name: Install WPScan and jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ruby-full build-essential libcurl4-openssl-dev zlib1g-dev jq
          sudo gem install wpscan --no-document

      - name: Run WPScan (vanilla) — JSON output
        env:
          WPSCAN_API_TOKEN: ${{ secrets.WPSCAN_API_TOKEN }}
        run: |
          mkdir -p scans/vanilla
          wpscan \
            --url http://localhost:8080 \
            --enumerate u,vp,vt,tt,cb,dbe \
            --plugins-detection aggressive \
            --force \
            ${WPSCAN_API_TOKEN:+--api-token "$WPSCAN_API_TOKEN"} \
            --output scans/vanilla/wpscan-vanilla.json \
            --format json \
            || true   # don't fail the job on findings

      - name: Summarize vanilla JSON findings
        run: |
          jq -r '
            "WPScan summary — vanilla",
            "WordPress version: \(.version.number // "unknown") (status: \(.version.status // "unknown"))",
            "Core vulnerabilities: \((.version.vulnerabilities // []) | length)",
            "Plugins detected: \((.plugins // {}) | length)",
            "Plugin vulnerabilities: \([(.plugins // {})[] | (.vulnerabilities // [])[]] | length)",
            "Themes detected: \((.themes // {}) | length)",
            "Users enumerated: \((.users // {}) | length)",
            "Interesting findings: \((.interesting_findings // []) | length)"
          ' scans/vanilla/wpscan-vanilla.json | tee scans/vanilla/wpscan-vanilla-summary.txt

      - name: Upload vanilla scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wpscan-vanilla
          path: scans/vanilla/
          if-no-files-found: warn
          retention-days: 30

      - name: Tear down stack
        if: always()
        run: docker compose -f "$COMPOSE_FILE" down -v --remove-orphans

  # JOB 2 – Build & push the hardened image
  build-hardened:
    name: "Build Hardened Image"
    runs-on: ubuntu-latest
    needs: wpscan-vanilla
    if: always() && (github.event_name == 'push' || github.event.inputs.scan_target == 'hardened')
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
            ${{ secrets.DOCKERHUB_USERNAME }}/wordpress-hardened
          tags: |
            type=sha,prefix=sha-
            type=raw,value=hardened
            type=raw,value=latest

      - name: Build and push hardened image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ./docker/Dockerfile.hardened
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # JOB 3 – Re-scan the hardened image (verify fixes)
  wpscan-hardened:
    name: "Scan Hardened WordPress"
    runs-on: ubuntu-latest
    needs: build-hardened
    if: always() && needs.build-hardened.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start stack via Docker Compose (hardened image)
        env:
          WP_IMAGE: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:hardened
          WP_INTERNAL_PORT: "8080"
        run: |
          docker compose -f "$COMPOSE_FILE" up -d --wait --wait-timeout 180

      - name: Wait for WordPress HTTP readiness
        run: |
          mkdir -p scans/hardened
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || true)
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "301" ]; then
              echo "WordPress responded with $STATUS"
              exit 0
            fi
            sleep 5
          done
          echo "WordPress did not become ready in time" >&2
          docker compose -f "$COMPOSE_FILE" logs --no-color > scans/hardened/compose.log || true
          exit 1

      - name: Complete WordPress installation
        run: |
          docker exec wp-site bash -c "
            wp core install \
              --url=http://localhost:8080 \
              --title='DevSecOps Lab' \
              --admin_user=admin \
              --admin_password=admin \
              --admin_email=admin@example.com \
              --skip-email \
              --allow-root
          "

      - name: Install WPScan and jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ruby-full build-essential libcurl4-openssl-dev zlib1g-dev jq
          sudo gem install wpscan --no-document

      - name: Run WPScan (hardened) — JSON output
        env:
          WPSCAN_API_TOKEN: ${{ secrets.WPSCAN_API_TOKEN }}
        run: |
          mkdir -p scans/hardened
          wpscan \
            --url http://localhost:8080 \
            --enumerate u,vp,vt,tt,cb,dbe \
            --plugins-detection aggressive \
            --force \
            ${WPSCAN_API_TOKEN:+--api-token "$WPSCAN_API_TOKEN"} \
            --output scans/hardened/wpscan-hardened.json \
            --format json \
            || true

      - name: Summarize hardened JSON findings
        run: |
          jq -r '
            "WPScan summary — hardened",
            "WordPress version: \(.version.number // "unknown") (status: \(.version.status // "unknown"))",
            "Core vulnerabilities: \((.version.vulnerabilities // []) | length)",
            "Plugins detected: \((.plugins // {}) | length)",
            "Plugin vulnerabilities: \([(.plugins // {})[] | (.vulnerabilities // [])[]] | length)",
            "Themes detected: \((.themes // {}) | length)",
            "Users enumerated: \((.users // {}) | length)",
            "Interesting findings: \((.interesting_findings // []) | length)"
          ' scans/hardened/wpscan-hardened.json | tee scans/hardened/wpscan-hardened-summary.txt

      - name: Fetch vanilla JSON and build comparison
        uses: actions/download-artifact@v4
        with:
          name: wpscan-vanilla
          path: scans/_vanilla
        continue-on-error: true

      - name: Compare vanilla vs hardened
        run: |
          mkdir -p scans/comparison
          VANILLA=$(find scans/_vanilla -name 'wpscan-vanilla.json' -type f 2>/dev/null | head -n 1)
          HARDENED=scans/hardened/wpscan-hardened.json
          if [ -z "$VANILLA" ] || [ ! -f "$VANILLA" ]; then
            echo "Vanilla JSON not available — skipping diff" | tee scans/comparison/comparison.txt
            exit 0
          fi
          jq -n \
            --slurpfile v "$VANILLA" \
            --slurpfile h "$HARDENED" '
              def count_findings(s):
                {
                  core_vulns:    ((s[0].version.vulnerabilities // []) | length),
                  plugin_vulns:  ([(s[0].plugins // {})[] | (.vulnerabilities // [])[]] | length),
                  users:         ((s[0].users // {}) | length),
                  findings:      ((s[0].interesting_findings // []) | length)
                };
              {
                vanilla:  count_findings($v),
                hardened: count_findings($h)
              }' | tee scans/comparison/comparison.json
          {
            echo "WPScan comparison (vanilla → hardened)"
            jq -r '
              "core_vulns:    \(.vanilla.core_vulns) → \(.hardened.core_vulns)",
              "plugin_vulns:  \(.vanilla.plugin_vulns) → \(.hardened.plugin_vulns)",
              "users:         \(.vanilla.users) → \(.hardened.users)",
              "findings:      \(.vanilla.findings) → \(.hardened.findings)"
            ' scans/comparison/comparison.json
          } | tee scans/comparison/comparison.txt

      - name: Upload hardened scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wpscan-hardened
          path: |
            scans/hardened/
            scans/comparison/
          if-no-files-found: warn
          retention-days: 30

      - name: Tear down stack
        if: always()
        run: docker compose -f "$COMPOSE_FILE" down -v --remove-orphans
